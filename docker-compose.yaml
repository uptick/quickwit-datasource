services:
  quickwit:
    image: quickwit/quickwit:${QUICKWIT_VERSION:-edge}
    environment:
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://localhost:7281
      - QW_ENABLE_OPENTELEMETRY_OTLP_EXPORTER=true
    command: ["run"]
    networks:
      - quickwit
    ports:
      - 7280:7280/tcp
  grafana:
    container_name: 'grafana-quickwit-datasource'
    build:
      context: ./.config
      args:
        grafana_version: ${GRAFANA_VERSION:-13.0.2}
        grafana_image: ${GRAFANA_IMAGE:-grafana-oss}
    environment:
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=quickwit-quickwit-app,quickwit-quickwit-datasource
    ports:
      - 3000:3000/tcp
    volumes:
      - ./dist:/var/lib/grafana/plugins/quickwit-quickwit-app
      - ./provisioning:/etc/grafana/provisioning
      - gquickwit:/var/lib/grafana
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - quickwit

networks:
  quickwit:
    driver: bridge

volumes:
  gquickwit:
